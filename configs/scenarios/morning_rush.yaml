name: "Morning Rush - Schiphol"

airport: "configs/airports/schiphol.yaml"

# Defines the traffic mix (probabilities and types)
# Must match a key in configs/components/aircraft_types.yaml
fleet_mix: "morning_rush_mix"

schedule:
  scenario_name: "Morning Peak 6AM-10AM"
  num_flights: 160
  generation_params:
    arrival_pattern: "normal_peak"
    time_window: [360, 600]  # 6 AM to 10 AM
    peak_time: 480           # 8 AM
    peak_std: 60
    runway_assignment: "uniform"
    runway_occupancy_time: 1 # Minutes runway is busy per movement

noise_model:
  distribution: "normal"
  params:
    mean: 0
    std: 8

rewards: "configs/components/reward_structures.yaml"
reward_profile: "morning_rush_rewards"

time:
  horizon: 1440
  timestep: 1
  S_max: 150