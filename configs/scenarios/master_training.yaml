name: "ADP Foundation Model Training"

airport: "configs/airports/schiphol.yaml"

# Hub mix: realistic Schiphol distribution (55% NB, 25% WB, 15% regional, 2% super-heavy, 3% cargo-heavy).
# Forces the agent to use the full airport across all gate categories.
fleet_mix: "hub_airport_mix"

schedule:
  scenario_name: "The Full Spectrum Day"
  num_flights: 2 # Dummy value, overridden by poisson generator
  generation_params:
    arrival_pattern: "poisson_rate"
    hourly_rate: 55         # ~74% wide-body gate utilization, ~65% narrow-body utilization.
    time_window: [30, 390]  # 6 hours of sustained heavy arrivals (~330 flights expected)
    runway_assignment: "uniform"
    runway_occupancy_time: 1

noise_models:
  arrival:
    distribution: "normal"
    params:
      mean: 0
      std: 5
  service:
    distribution: "normal"
    params:
      std: 10  # The mean is automatically the aircraft's base_service

rewards: "configs/components/reward_structures.yaml"
reward_profile: "high_load_rewards"

time:
  horizon: 720 # 10-hour sim: ~3 hours after last arrival for the queue to clear.
  timestep: 1
  S_max: 60