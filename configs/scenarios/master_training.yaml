name: "ADP Foundation Model Training"

airport: "configs/airports/schiphol.yaml"

# Use a mix that forces the AI to use the ENTIRE airport, not just the heavy gates.
# Assuming you have a standard or balanced mix in your configs.
# (e.g., 50% narrow, 35% wide, 15% super-heavy)
fleet_mix: "hub_airport_mix"

schedule:
  scenario_name: "The Full Spectrum Day"
  num_flights: 2 # Dummy value, overridden by poisson generator
  generation_params:
    arrival_pattern: "poisson_rate"
    hourly_rate: 35         # Pushes the airport right to the edge of capacity, but not over it
    time_window: [30, 390]  # 7 hours of sustained, heavy arrivals
    runway_assignment: "uniform"
    runway_occupancy_time: 1

noise_models:
  arrival:
    distribution: "normal"
    params:
      mean: 0
      std: 5
  service:
    distribution: "normal"
    params:
      std: 10  # The mean is automatically the aircraft's base_service

rewards: "configs/components/reward_structures.yaml"
reward_profile: "morning_rush_rewards"

time:
  horizon: 720 # 10-hour simulation. Gives the AI 3 hours at the end to completely clear the queue and empty the airport.
  timestep: 1
  S_max: 60