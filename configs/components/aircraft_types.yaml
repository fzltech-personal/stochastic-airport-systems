# configs/components/aircraft_types.yaml

# ---------------------------------------------------------
# SINGLE SOURCE OF TRUTH: Reusable aircraft type definitions
# ---------------------------------------------------------
aircraft_types:
  regional:
    name: "regional"
    base_service_mean: 35
    base_service_std: 1
    description: "Cityhopper jets (Embraer E-jets)"
    typical_routes: "Short-haul European"

  narrow-body:
    name: "narrow-body"
    base_service_mean: 50
    base_service_std: 1
    description: "Single-aisle aircraft (B737, A320 family)"
    typical_routes: "European and short international"

  wide-body:
    name: "wide-body"
    base_service_mean: 100
    base_service_std: 1
    description: "Twin-aisle aircraft (A330, B777, B787)"
    typical_routes: "Long-haul intercontinental"

  super-heavy:
    name: "super-heavy"
    base_service_mean: 135
    base_service_std: 1
    description: "Ultra-large aircraft (A380)"
    typical_routes: "High-capacity intercontinental"

  cargo-small:
    name: "cargo-small"
    base_service_mean: 70
    base_service_std: 1
    description: "Cargo conversion of narrow-body"

  cargo-heavy:
    name: "cargo-heavy"
    base_service_mean: 180
    base_service_std: 1
    description: "Dedicated heavy freighters (B747F)"

# ---------------------------------------------------------
# FLEET MIXES: Just references to types and their probabilities
# ---------------------------------------------------------
fleet_mixes:
  hub_airport_mix:
    regional: 0.15
    narrow-body: 0.55
    wide-body: 0.25
    super-heavy: 0.02
    cargo-heavy: 0.03

  regional_airport_mix:
    regional: 0.30
    narrow-body: 0.70

  cargo_hub_mix:
    cargo-small: 0.40
    cargo-heavy: 0.60

  morning_rush_mix:
    regional: 0.05
    narrow-body: 0.70
    wide-body: 0.25

  heavy_trap_mix:
      regional: 0.0
      narrow-body: 0.0
      wide-body: 0.70
      super-heavy: 0.30
      cargo-small: 0.0
      cargo-heavy: 0.0