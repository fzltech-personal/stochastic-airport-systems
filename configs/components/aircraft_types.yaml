# Reusable aircraft type definitions
# Scenarios can import these or define custom types

standard_types:
  regional:
    name: "regional"
    base_service_mean: 30
    base_service_std: 3
    description: "Small regional jets (50-100 passengers)"
    typical_routes: "Short-haul domestic"

  narrow_body:
    name: "narrow-body"
    base_service_mean: 45
    base_service_std: 5
    description: "Single-aisle aircraft (A320, B737 family)"
    typical_routes: "Domestic and short international"

  wide_body:
    name: "wide-body"
    base_service_mean: 90
    base_service_std: 10
    description: "Twin-aisle aircraft (A350, B777, B787)"
    typical_routes: "Long-haul international"

  super_heavy:
    name: "super-heavy"
    base_service_mean: 120
    base_service_std: 15
    description: "Ultra-large aircraft (A380, B747-8)"
    typical_routes: "Ultra-long-haul, high-capacity"

cargo_types:
  cargo_small:
    name: "cargo-small"
    base_service_mean: 60
    base_service_std: 8
    description: "Cargo conversion of narrow-body"

  cargo_heavy:
    name: "cargo-heavy"
    base_service_mean: 150
    base_service_std: 20
    description: "Dedicated cargo aircraft (B747F, B777F)"

# Typical fleet mixes for different airport profiles

hub_airport_mix:
  # Major international hub (e.g., AMS, FRA, LHR)
  - name: "regional"
    base_service_mean: 30
    base_service_std: 3
    probability: 0.05
  - name: "narrow-body"
    base_service_mean: 45
    base_service_std: 5
    probability: 0.55
  - name: "wide-body"
    base_service_mean: 90
    base_service_std: 10
    probability: 0.35
  - name: "super-heavy"
    base_service_mean: 120
    base_service_std: 15
    probability: 0.05

regional_airport_mix:
  # Regional airport (mostly domestic)
  - name: "regional"
    base_service_mean: 30
    base_service_std: 3
    probability: 0.30
  - name: "narrow-body"
    base_service_mean: 45
    base_service_std: 5
    probability: 0.70

cargo_hub_mix:
  # Dedicated cargo hub (e.g., MEM, ANC)
  - name: "cargo-small"
    base_service_mean: 60
    base_service_std: 8
    probability: 0.40
  - name: "cargo-heavy"
    base_service_mean: 150
    base_service_std: 20
    probability: 0.60